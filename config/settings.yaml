model:
  name: claude-sonnet-4-6
  max_tokens: 2000

retrieval:
  top_k: 8
  min_score: 0.05
  mistake_boost: 2.0
  ignored_pushback_boost: 1.5
  recency_half_life_days: 365

heartbeat:
  follow_up_days: 30
  check_interval_hours: 24

paths:
  corpus: memory/corpus
  history: memory/history
  heartbeat_queue: heartbeat/HEARTBEAT.md
  corpus_lock: memory/corpus/.corpus.lock
